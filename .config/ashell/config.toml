log_level = "warn"
# outputs = { Targets = ["eDP-1"] }
outputs = "All"
position = "Top"
app_launcher_cmd = "rofi -show drun"
enable_esc_key = true

[modules]
left = [ [ "appLauncher", "Workspaces", "WindowTitle" ] ]
center = [ "Clock" ]
right = [ ["MediaPlayer"], ["Privacy"], ["Tray"], ["SystemInfo"], [ "Settings" ] ]


[updates]
check_cmd = "checkupdates; yay -Qua"
update_cmd = 'alacritty --title floatingterm -e bash -c "yay; echo Done - Press enter to exit; read" &'

 [clock]
format = "%a %d %b  %I:%M %p"

[workspaces]
enable_workspace_filling = true
max_workspaces = 5
workspace_names = ["一","二","三","四","五","六","七","八","九","十",]
# workspace_names = ["","","","","","","","","","",]


[[CustomModule]]
name = "appLauncher"
icon = "󰣇 archlinux"
command = "rofi -show drun"

[window_title]
mode = "Class"
truncate_title_after_length = 100

[system_info]
indicators = [ "Cpu", "Memory", "Temperature", "DownloadSpeed" ]

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.disk]
warn_threshold = 80
alert_threshold = 90

[system_info.temperature]
warn_threshold = 70
alert_threshold = 80
sensor = "acpitz temp1"

[settings]
indicators = ["IdleInhibitor", "PowerProfile", "Audio", "Bluetooth", "Network", "Vpn", "Battery"]
lock_cmd = "playerctl --all-players pause; hyprlock &"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd ="alacritty --config-file /dev/null --title nmtui -e nmtui"
vpn_more_cmd ="alacritty --config-file /dev/null --title nmtui -e nmtui"
bluetooth_more_cmd = "blueman-manager"
battery_format = "IconAndPercentage"

[appearance]
style = "Solid"
opacity = 0.7

primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"

workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#000000"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"

[appearance.menu]
opacity = 0.6
# backdrop = 0.3
